<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="58" fill="#0d5fa3" stroke="#1876c8" stroke-width="2"/>
  <!-- Inner circle background -->
  <circle cx="60" cy="60" r="50" fill="#1876c8"/>
  <!-- Light inner ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Bowl (Чаша Гигеи) -->
  <ellipse cx="60" cy="78" rx="18" ry="6" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <path d="M42 78 Q42 90 60 90 Q78 90 78 78" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Bowl stem -->
  <rect x="58" y="58" width="4" height="22" rx="2" fill="#ffffff"/>
  <!-- Bowl base -->
  <rect x="50" y="86" width="20" height="3" rx="1.5" fill="#ffffff"/>

  <!-- Snake (Змея) -->
  <path d="M60 30
           C68 35, 72 42, 65 48
           C58 54, 54 56, 60 58"
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Snake head -->
  <ellipse cx="60" cy="28" rx="4" ry="5" fill="#ffffff"/>
  <!-- Snake tongue -->
  <path d="M59 23 L57 20 M59 23 L61 20" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Cross in background (subtle) -->
  <rect x="56" y="38" width="8" height="32" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="44" y="50" width="32" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>

  <!-- Text arc top -->
  <path id="topArc" d="M 18,60 A 42,42 0 0,1 102,60" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#ffffff" letter-spacing="0.5">
    <textPath href="#topArc" startOffset="5%">КОЧКОР-АТА  МЕДКОЛЛЕДЖ</textPath>
  </text>

  <!-- Stars decoration -->
  <circle cx="24" cy="60" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="96" cy="60" r="2" fill="rgba(255,255,255,0.5)"/>
</svg>
