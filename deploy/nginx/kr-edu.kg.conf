# Nginx config for kr-edu.kg
# Place at /etc/nginx/sites-available/kr-edu.kg.conf
# then: ln -s /etc/nginx/sites-available/kr-edu.kg.conf /etc/nginx/sites-enabled/
# Assumes Django is run via gunicorn on a unix socket at /run/gunicorn-kr-edu.sock
# (see deploy/gunicorn.service in this same folder for the matching systemd unit).

upstream kr_edu_app {
    server unix:/run/gunicorn-kr-edu.sock fail_timeout=0;
}

# Plain HTTP — only used to redirect to HTTPS and to answer certbot's
# ACME challenge during certificate issuance/renewal.
server {
    listen 80;
    listen [::]:80;
    server_name kr-edu.kg www.kr-edu.kg;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kr-edu.kg www.kr-edu.kg;

    ssl_certificate     /etc/letsencrypt/live/kr-edu.kg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kr-edu.kg/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 12M;     # matches DATA_UPLOAD_MAX_MEMORY_SIZE in settings.py

    # Security headers (Django also sets some of these; harmless to repeat at the edge)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Basic rate limiting at the edge — backs up the app-level RateLimitMiddleware
    limit_req_zone $binary_remote_addr zone=kr_edu_general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=kr_edu_login:10m rate=2r/s;

    root /var/www/kr-edu.kg;

    location /static/ {
        alias /var/www/kr-edu.kg/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/kr-edu.kg/media/;
        access_log off;
        expires 7d;
    }

    location /admin/login/ {
        limit_req zone=kr_edu_login burst=5 nodelay;
        proxy_pass http://kr_edu_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=kr_edu_general burst=20 nodelay;
        proxy_pass http://kr_edu_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block direct access to the sqlite DB / .env if they ever end up under root by mistake
    location ~* \.(sqlite3|env)$ {
        deny all;
    }
}
